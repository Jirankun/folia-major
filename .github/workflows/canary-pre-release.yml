name: Publish Cielo Canary

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

permissions:
  contents: write

concurrency:
  group: cielo-canary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Check for Cielo marker
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[canary]')
    outputs:
      version: ${{ steps.meta.outputs.version }}
      branch_name: ${{ steps.meta.outputs.branch_name }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Determine Cielo version
        id: meta
        shell: bash
        run: |
          BASE_VERSION="$(jq -r .version package.json | sed 's/-.*//')"
          if [[ ! "${BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json must contain a semver base version" >&2
            exit 1
          fi
          echo "version=${BASE_VERSION}-alpha.$(date -u +%s)" >> "$GITHUB_OUTPUT"
          echo "branch_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

  build:
    name: Build Cielo on ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp Cielo package metadata
        shell: bash
        env:
          TARGET_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const pkg=require('./package.json'); pkg.version=process.env.TARGET_VERSION; pkg.foliaReleaseChannel='cielo'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Build web app for Electron
        env:
          ELECTRON: 'true'
          APP_VERSION_LABEL: Cielo
          APP_RELEASE_CHANNEL: cielo
        run: npm run build

      - name: Package Electron app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish never -c.publish.channel=alpha

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cielo-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/*.yml
            release/*.deb
            release/*.rpm
            release/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish rolling Cielo prerelease
    runs-on: ubuntu-latest
    needs: [prepare, build]

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: cielo-artifacts

      - name: Replace rolling Cielo release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          BRANCH_NAME: ${{ needs.prepare.outputs.branch_name }}
        shell: bash
        run: |
          gh release delete cielo --repo "${GITHUB_REPOSITORY}" --cleanup-tag --yes >/dev/null 2>&1 || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/cielo" >/dev/null 2>&1 || true
          mapfile -d '' files < <(find cielo-artifacts -type f -print0)
          cat > release-notes.md <<EOF
          Cielo canary build for branch ${BRANCH_NAME} at commit ${GITHUB_SHA}.

          Version: ${RELEASE_VERSION}
          Source commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          EOF
          gh release create cielo "${files[@]}" --repo "${GITHUB_REPOSITORY}" --title "Cielo Canary (${RELEASE_VERSION})" --notes-file release-notes.md --target "${GITHUB_SHA}" --prerelease
